BASE: https://proxy.gidlab.rnp.br

COOKIE_STATE_NAME: "SATOSA_STATE"
CONTEXT_STATE_DELETE: True
STATE_ENCRYPTION_KEY: "asdASD123"

cookies_samesite_compat:
  - ["SATOSA_STATE", "SATOSA_STATE_LEGACY"]

INTERNAL_ATTRIBUTES: "/satosa/internal_attributes.yaml"

CUSTOM_PLUGIN_MODULE_PATHS:
  - "/satosa/plugins/frontends"
  - "/satosa/plugins/backends"

BACKEND_MODULES:
  - "/satosa/plugins/backends/saml2_backend.yaml"
  - "/satosa/plugins/backends/github_backend.yaml" 
  - "/satosa/plugins/backends/google_backend.yaml"

FRONTEND_MODULES:
  - "/satosa/plugins/frontends/saml2_frontend.yaml"
  - "/satosa/plugins/frontends/mirror_frontend.yaml"

MICRO_SERVICES:
  - "/satosa/plugins/microservices/static_attributes.yaml"

LOGGING:
  version: 1
  formatters:
    simple:
      format: "[%(asctime)s] [%(levelname)s] [%(name)s.%(funcName)s] %(message)s"
  handlers:
    stdout:
      class: logging.StreamHandler
      stream: "ext://sys.stdout"
      level: DEBUG
      formatter: simple
    syslog:
      class: logging.handlers.SysLogHandler
      address: "/dev/log"
      level: DEBUG
      formatter: simple
    debug_file:
      class: logging.FileHandler
      filename: logs/satosa-debug.log
      encoding: utf8
      level: DEBUG
      formatter: simple
    error_file:
      class: logging.FileHandler
      filename: logs/satosa-error.log
      encoding: utf8
      level: ERROR
      formatter: simple
    info_file:
      class: logging.handlers.RotatingFileHandler
      filename: logs/satosa-info.log
      encoding: utf8
      maxBytes: 10485760 # 10MB
      backupCount: 20
      level: INFO
      formatter: simple
  loggers:
    satosa:
      level: DEBUG
    saml2:
      level: DEBUG
    oidcendpoint:
      level: DEBUG
    pyop:
      level: DEBUG
    oic:
      level: DEBUG
  root:
    level: DEBUG
    handlers:
      - stdout
