module: satosa.backends.saml2.SAMLBackend
name: Saml2
config:
  #idp_blacklist_file: /path/to/blacklist.json

  entityid_endpoint: true
  mirror_force_authn: false
  memorize_idp: false
  use_memorized_idp_when_force_authn: false
  send_requester_id: no

  sp_config:
    key_file: /satosa/metadata.key
    cert_file: /satosa/metadata.crt
    encryption_keypairs: [
    {
        'key_file': '/satosa/metadata.key',
        'cert_file': '/satosa/metadata.crt'
    }
    ]
    attribute_map_dir: attributemaps
    #allow_unknown_attributes: yes
    organization: {display_name: SP Proxy GIdLab, name: GIdLab, url: 'https://gidlab.rnp.br'}
    contact_person:
    - {contact_type: technical, email_address: gidlab@rnp.br, given_name: GIdLab}
    - {contact_type: support, email_address: atendimento@rnp.br, given_name: GIdLab}

    metadata:
      #local: [/satosa/plugins/backends/metadatas/ds-cafeexpresso.xml]
      remote:
        - url: "https://ds.cafeexpresso.rnp.br/metadata/ds-metadata.xml"
          cert: null

    entityid: <base_url>/<name>/proxy_saml2_backend
    accepted_time_diff: 60
    service:
      sp:
        ui_info:
          display_name:
            - lang: en
              text: "SP Proxy GIdLab"
          description:
            - lang: en
              text: "SATOSA Backend"
          information_url:
            - lang: en
              text: "http://sp.information.url/"
          privacy_statement_url:
            - lang: en
              text: "http://sp.privacy.url/"
          keywords:
            - lang: se
              text: ["Satosa", "SP-SE"]
            - lang: en
              text: ["Satosa", "SP-EN"]
          logo:
            text: "http://sp.logo.url/"
            width: "100"
            height: "100"
        want_assertions_signed: true
        authn_requests_signed: true
        want_response_signed: true
        allow_unsolicited: false
        endpoints:
          assertion_consumer_service:
          - [<base_url>/<name>/acs/post, 'urn:oasis:names:tc:SAML:2.0:bindings:HTTP-POST']
          discovery_response:
          - [<base_url>/<name>/disco, 'urn:oasis:names:tc:SAML:profiles:SSO:idp-discovery-protocol']
        name_id_format: 'urn:oasis:names:tc:SAML:2.0:nameid-format:transient'
        # A name_id_format of 'None' will cause the authentication request to not
        # include a Format attribute in the NameIDPolicy.
        # name_id_format: 'None'
        name_id_format_allow_create: true
  # disco_srv must be defined if there is more than one IdP in the metadata specified above
  disco_srv: https://ds.cafeexpresso.rnp.br/WAYF.php
